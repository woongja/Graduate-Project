# AASIST Fine-tuning (Full Model Training)

model:
  type: aasist
  ssl_model_path: /home/woongjae/ADD_LAB/projects/Graduate-Project/02_LoRA_Training/pretrained/xlsr2_300m.pt
  base_model_path: /home/woongjae/ADD_LAB/projects/Graduate-Project/02_LoRA_Training/pretrained/aasist.pth  # Optional: pretrained checkpoint

data:
  train_protocol: protocols/asv19_train.txt
  dev_protocol: protocols/asv19_dev.txt
  audio_dir: /path/to/dataset
  batch_size: 24
  num_workers: 8
  sample_rate: 16000
  max_length: 64600
  padding_type: repeat
  random_start: true
  augmentation_type: none

training:
  mode: finetune
  num_epochs: 30
  lr: 0.00001
  weight_decay: 0.0001
  device: cuda:0
  save_dir: out/aasist_finetune
  early_stop_patience: 5
  class_weights: [0.9, 0.1]
  scheduler:
    milestones: [10, 20]
    gamma: 0.1

logging:
  use_tensorboard: true
  tensorboard_dir: runs/aasist_finetune
