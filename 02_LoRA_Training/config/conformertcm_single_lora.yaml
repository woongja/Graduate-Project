# ConformerTCM Single LoRA Training

model:
  type: conformertcm
  ssl_model_path: /home/woongjae/ADD_LAB/projects/Graduate-Project/02_LoRA_Training/pretrained/xlsr2_300m.pt
  base_model_path: /home/woongjae/ADD_LAB/projects/Graduate-Project/02_LoRA_Training/pretrained/conformertcm.pth
  conformer:
    emb_size: 144
    num_encoders: 4
    heads: 4
    kernel_size: 31

lora:
  r: 16
  alpha: 16
  dropout: 0.0
  target_modules: [q_proj, v_proj, k_proj, out_proj, fc1, fc2, LL]

data:
  train_protocol: protocols/asv19_train.txt
  dev_protocol: protocols/asv19_dev.txt
  audio_dir: /path/to/dataset
  batch_size: 32
  num_workers: 8
  sample_rate: 16000
  max_length: 64600
  padding_type: repeat
  random_start: true
  augmentation_type: none

training:
  mode: single_lora
  num_epochs: 30
  lr: 0.00001
  weight_decay: 0.0001
  device: cuda:0
  save_dir: out/conformertcm_single_lora
  early_stop_patience: 5
  class_weights: [0.9, 0.1]
  scheduler:
    milestones: [5, 15]
    gamma: 0.1

logging:
  use_tensorboard: true
  tensorboard_dir: runs/conformertcm_single_lora
