background_noise:
  aug_type: background_noise
  noise_path: "/nvme3/Datasets/musan/noise"
  min_SNR_dB: -6
  max_SNR_dB: 3

background_music:
  aug_type: background_music
  music_path: "/nvme3/Datasets/musan/music"
  min_SNR_dB: 10
  max_SNR_dB: 20

gaussian_noise:
  aug_type: gaussian_noise
  min_std_dev: 0.01
  max_std_dev: 0.2
  mean: 0.0

high_pass_filter:
  aug_type: high_pass_filter
  min_cutoff_freq: 2000
  max_cutoff_freq: 4000

low_pass_filter:
  aug_type: low_pass_filter
  min_cutoff_freq: 300
  max_cutoff_freq: 1500

pitch_shift:
  aug_type: pitch_shift
  min_abs_semitones: 2
  max_abs_semitones: 5

time_stretch:
  aug_type: time_stretch
  min_factor: 0.6
  max_factor: 1.4

auto_tune:
  aug_type: auto_tune
  correction_method: closest

echo:
  aug_type: echo
  min_delay: 0.05
  max_delay: 1.5
  min_decay: 0.2
  max_decay: 1.0

reverberation:
  aug_type: reverberation
  rir_path: "/nvme3/Datasets/RIRS_NOISES"
