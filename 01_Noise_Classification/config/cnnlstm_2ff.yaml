# ── CNN+LSTM 2-Feature Fusion (Spectrogram + F0) Config ──────────
model: cnnlstm_2ff

# 모델 하이퍼파라미터
branch_output_dim: 512     # 각 branch의 output dimension
fusion_hidden_dim: 512     # fusion layer hidden dimension
dropout: 0.5               # dropout rate

# F0 추출 방법
f0_method: crepe           # 'crepe' or 'yin'

# 오디오 설정
clip_duration: 10.0        # 오디오 클립 길이 (초)

# 학습 설정
batch_size: 16             # 2FF는 F0 추출이 느려서 배치 사이즈 작게
num_epochs: 100
learning_rate: 1.0e-4
early_stop_patience: 10
num_workers: 2             # F0 추출 때문에 workers 줄임

# 프로토콜 파일
train_protocol: ../protocols/train_protocol.txt
eval_protocol:  ../protocols/eval_protocol.txt

# 저장 경로
save_path: ../out/cnnlstm_2ff
log_dir:   ../runs/cnnlstm_2ff
