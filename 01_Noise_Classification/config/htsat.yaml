# ── HTSAT Fine-tuning Config ───────────────────────────────────
model: htsat
pretrained_mdl_path: ../pretrained_model/HTSAT_AudioSet.ckpt

# 오디오 설정 (AudioSet pretrained 기본값 유지)
sample_rate: 32000
clip_duration: 10.0      # 입력 오디오 클립 길이 (초)

# 학습 설정
batch_size: 32
num_epochs: 100
learning_rate: 1.0e-4
early_stop_patience: 10
num_workers: 4

# 프로토콜 파일
train_protocol: ../protocols/train_protocol.txt
eval_protocol:  ../protocols/eval_protocol.txt

# 저장 경로
save_path: ../out/htsat
log_dir:   ../runs/htsat
